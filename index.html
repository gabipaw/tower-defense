<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#4f46e5" />
  <title>Tower Defense — Gabriel Pawłowski</title>
  <style>
    :root { --brand:#4f46e5; --brand-dark:#3730a3; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0; }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body {
      min-height:100dvh; display:flex; flex-direction:column; align-items:center; gap:0.75rem;
      padding:1rem; font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; color:var(--ink);
      background:linear-gradient(135deg,#eef2ff 0%,#f8fafc 50%,#ecfeff 100%); touch-action:manipulation;
    }
    h1 { font-size:clamp(1.2rem,4.5vw,1.7rem); letter-spacing:-0.01em; text-align:center; }
    .hud {
      display:flex; flex-wrap:wrap; gap:0.5rem 1rem; justify-content:center; align-items:center;
      background:#fff; border:1px solid var(--line); border-radius:0.9rem; padding:0.6rem 1rem;
      box-shadow:0 12px 30px -20px rgba(79,70,229,0.4); font-weight:700; font-size:0.95rem;
    }
    .hud .item { display:flex; align-items:center; gap:0.35rem; }
    .hud .muted { color:var(--muted); font-weight:600; }
    .wrapc { width:min(96vw,800px); }
    .stage { position:relative; width:100%; }
    canvas {
      width:100%; height:auto; display:block; border-radius:1rem;
      box-shadow:0 20px 45px -20px rgba(79,70,229,0.55); background:#dcfce7; touch-action:manipulation;
    }
    .towers-layer { position:absolute; inset:0; pointer-events:none; }
    .tower-sprite {
      position:absolute; width:auto; transform:translate(-50%,-58%);
      image-rendering:auto; filter:drop-shadow(0 4px 4px rgba(0,0,0,0.35));
    }
    /* idle mieści się w jednym kaflu (~1/8 wysokości); atak nieco większy = wrażenie zbliżenia */
    .tower-sprite.sprite-idle   { height:13%; }
    .tower-sprite.sprite-attack { height:15%; }
    .controls { display:flex; gap:0.6rem; flex-wrap:wrap; justify-content:center; }
    button.btn {
      padding:0.65rem 1.2rem; font-size:0.95rem; font-weight:700; color:#fff; border:none;
      border-radius:0.75rem; cursor:pointer; background:linear-gradient(135deg,var(--brand),var(--brand-dark));
    }
    button.btn.secondary { color:var(--brand-dark); background:#eef2ff; }
    button.btn:disabled { opacity:0.5; cursor:not-allowed; }
    .tower-picker { display:flex; gap:0.5rem; flex-wrap:wrap; justify-content:center; }
    .tower-picker .tw {
      display:flex; flex-direction:column; align-items:center; gap:0.1rem; min-width:5.4rem;
      padding:0.45rem 0.6rem; border:2px solid var(--line); border-radius:0.7rem; background:#fff;
      cursor:pointer; font-weight:700; font-size:0.8rem; color:var(--ink); line-height:1.15;
    }
    .tower-picker .tw .ico { font-size:1.35rem; }
    .tower-picker .tw .cost { color:var(--muted); font-weight:600; }
    .tower-picker .tw.sel { border-color:var(--brand); background:#eef2ff; box-shadow:0 6px 16px -10px rgba(79,70,229,0.7); }
    .tower-picker .tw.poor { opacity:0.5; }
    .tower-panel[hidden] { display:none; }
    .tower-panel {
      display:flex; flex-wrap:wrap; gap:0.5rem 0.9rem; align-items:center; justify-content:center;
      background:#fff; border:1px solid var(--line); border-radius:0.9rem; padding:0.55rem 0.9rem;
      box-shadow:0 12px 30px -20px rgba(79,70,229,0.4); font-size:0.9rem; font-weight:600;
    }
    .tower-panel .title { font-weight:800; }
    .tower-panel .stats { color:var(--muted); }
    .tower-panel button { padding:0.5rem 0.9rem; font-size:0.88rem; }
    .tower-panel .za { background:linear-gradient(135deg,#7c3aed,#4c1d95); }
    .tower-panel .close { background:#eef2ff; color:var(--brand-dark); }
    .hint { color:var(--muted); font-size:0.85rem; text-align:center; max-width:40rem; }
    .banner {
      font-size:1.1rem; font-weight:800; text-align:center; min-height:1.5rem;
    }
    .banner.win { color:#16a34a; } .banner.lose { color:#dc2626; }
  </style>
</head>
<body>
  <h1>🏰 Tower Defense</h1>

  <div class="hud">
    <div class="item">💰 <span data-testid="money" id="money">0</span></div>
    <div class="item">❤️ <span data-testid="lives" id="lives">0</span></div>
    <div class="item">🌊 Fala <span data-testid="wave" id="wave">0</span><span class="muted">/<span id="maxwave">0</span></span></div>
    <div class="item muted" id="phase" data-testid="phase">—</div>
  </div>

  <div class="wrapc">
    <div class="stage" id="stage">
      <canvas id="game" data-testid="canvas"></canvas>
      <div class="towers-layer" id="towersLayer"></div>
    </div>
  </div>

  <div class="banner" id="banner" data-testid="banner"></div>

  <div class="tower-picker" id="towerPicker" data-testid="towerPicker"></div>

  <div class="tower-panel" id="towerPanel" data-testid="towerPanel" hidden></div>

  <div class="controls">
    <button class="btn" id="start" data-testid="start">▶️ Start fali</button>
    <button class="btn secondary" id="reset" data-testid="reset">🔄 Nowa gra</button>
  </div>
  <p class="hint">Wybierz typ wieży powyżej, potem kliknij / dotknij wolne pole (trawa), aby ją postawić. Wieże atakują wrogów w zasięgu. Nie wpuść ich na koniec ścieżki!</p>

  <script>
  (function () {
    const COLS = 12, ROWS = 8, TILE = 64;
    const W = COLS * TILE, H = ROWS * TILE;
    const MAX_WAVES = 8;
    const KILL_REWARD = 12;
    const UP = "translate(-50%,-58%) rotate(0deg) scaleY(1)";

    // ── Katalog wież. Nowy typ = jeden wpis + para zapętlonych gifów (idle/attack). ──
    //  melee : doskok i obrót ku wrogowi, cios wręcz (pocisk niewidoczny).
    //  ranged: stoi na kaflu, tylko odbicie lewo/prawo; leci widoczny pocisk (kula lub strzała).
    //  Każda wieża ma 3 poziomy (levels[]). Ulepszanie zwiększa staty; `up` = koszt
    //  ulepszenia do następnego poziomu (0 = poziom maksymalny).
    const TOWER_TYPES = {
      basic: {                                  // prosta wieża startowa (ranged)
        name: "Działko", icon: "🔫", cost: 50,
        melee: false, projColor: "#2563eb", projSize: 5, projSpeed: 340,
        idle: "basic_idle.gif", attack: "basic_attack.gif", idleH: "12%", attackH: "13%",
        levels: [
          { dmg: 2, rate: 1.0, range: 1.8 * TILE, up: 40 },   // L1 → koszt do L2 (2,0 dps)
          { dmg: 3, rate: 1.1, range: 2.0 * TILE, up: 80 },   // L2 → koszt do L3 (3,3 dps)
          { dmg: 5, rate: 1.3, range: 2.2 * TILE, up: 0  },   // L3 (max, 6,5 dps)
        ],
      },
      archer: {                                 // wieża dystansowa
        name: "Łucznik", icon: "🏹", cost: 70,
        melee: false, arrow: true, projColor: "#a16207", projSpeed: 560,
        idle: "archer_idle.gif", attack: "archer_attack.gif", idleH: "12%", attackH: "13%",
        levels: [
          { dmg: 1, rate: 1.6, range: 2.8 * TILE, up: 55 },   // 1,6 dps, długi zasięg
          { dmg: 2, rate: 1.9, range: 3.1 * TILE, up: 85 },   // 3,8 dps
          { dmg: 3, rate: 2.3, range: 3.6 * TILE, up: 0  },   // 6,9 dps
        ],
      },
      jotaro: {                                 // walka wręcz z NARASTAJĄCYM DPS-em (Star Platinum)
        name: "Jotaro", icon: "🥊", cost: 45,
        melee: true, lunge: 0.5 * TILE, facingOffset: 0,
        idle: "spawn.gif", attack: "tower.gif", idleH: "13%", attackH: "15%",
        ramp: true, rampMax: 3, rampTime: 3,    // im dłużej bije JEDEN cel, tym mocniej: do 3× po 3 s
        levels: [
          { dps: 0.5, range: 1.9 * TILE, up: 55 },                // L1 (do 1,5 dps po rozpędzeniu)
          { dps: 1.0, range: 2.0 * TILE, up: 90 },                // L2 (do 3,0 dps)
          { dps: 2.0, range: 2.2 * TILE, up: 0, timeStop: true }, // L3: do 6,0 dps + ZA WARUDO
        ],
      },
    };
    const TIMESTOP_DUR = 6;     // ile sekund wrogowie stoją w miejscu (ZA WARUDO)
    const TIMESTOP_CD = 60;     // odnowienie zdolności (1 minuta)
    let selectedType = "basic"; // typ do budowy (koszt 50 — zgodnie z testami)
    let selectedTower = null;   // postawiona wieża wybrana do ulepszenia / zdolności
    let timeStop = 0;           // pozostały czas globalnego stopu (s)
    let stopHolder = null;      // JEDYNY Jotaro, który może użyć ZA WARUDO (pierwszy na L3)

    const stat = (t) => TOWER_TYPES[t.type].levels[t.level - 1];  // aktywne staty wg poziomu
    const isMax = (t) => t.level >= TOWER_TYPES[t.type].levels.length;

    // Cel wieży: TRZYMAJ obecny cel, dopóki żyje i jest w zasięgu — bez przeskakiwania
    // na „bliższego" (to psuło zabawę na zakrętach). Gdy trzeba złapać nowy cel, bierzemy
    // wroga NAJDALEJ na trasie (pierwszego/lidera) spośród tych w zasięgu — nie najbliższego.
    function progress(e) {                    // jak daleko wróg zaszedł na trasie (większe = dalej)
      const wpx = pathPx[e.wp];
      return e.wp * 100000 - (wpx ? Math.hypot(wpx.x - e.x, wpx.y - e.y) : 0);
    }
    function pickTarget(t, range) {
      if (t.target && enemies.includes(t.target) &&
          Math.hypot(t.target.x - t.x, t.target.y - t.y) <= range) {
        return t.target;                     // wciąż ważny → nie zmieniamy
      }
      let best = null, bestProg = -Infinity;  // nowy cel → pierwszy wróg (lider) w zasięgu
      for (const e of enemies) {
        if (Math.hypot(e.x - t.x, e.y - t.y) > range) continue;
        const pr = progress(e);
        if (pr > bestProg) { bestProg = pr; best = e; }
      }
      return best;
    }

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const towersLayer = document.getElementById("towersLayer");

    // ── pasek wyboru wież ──
    function buildPicker() {
      const wrap = document.getElementById("towerPicker");
      wrap.innerHTML = "";
      for (const [id, def] of Object.entries(TOWER_TYPES)) {
        const b = document.createElement("button");
        b.type = "button";
        b.className = "tw" + (id === selectedType ? " sel" : "");
        b.dataset.type = id;
        b.dataset.testid = "tower-" + id;
        b.innerHTML = '<span class="ico">' + def.icon + '</span><span>' + def.name +
                      '</span><span class="cost">💰 ' + def.cost + '</span>';
        b.addEventListener("click", () => { selectedType = id; refreshPicker(); });
        wrap.appendChild(b);
      }
    }
    function refreshPicker() {
      for (const b of document.querySelectorAll("#towerPicker .tw")) {
        const def = TOWER_TYPES[b.dataset.type];
        b.classList.toggle("sel", b.dataset.type === selectedType);
        b.classList.toggle("poor", money < def.cost);
      }
    }

    // ── panel wybranej (postawionej) wieży: staty, ulepszenie, zdolność ──
    const tiles = (px) => Math.round(px / TILE * 10) / 10;   // zasięg w kaflach (ładniejszy zapis)
    function statLine(t) {
      const def = TOWER_TYPES[t.type], st = stat(t);
      if (def.ramp) return "DPS " + st.dps + "/s (rośnie do " + def.rampMax + "× im dłużej bije) • zasięg " + tiles(st.range);
      return "obrażenia " + st.dmg + " • tempo " + st.rate + "/s • zasięg " + tiles(st.range);
    }
    function selectTower(t) { selectedTower = t; refreshPanel(); }
    function refreshPanel() {
      const panel = document.getElementById("towerPanel");
      if (!selectedTower || !towers.includes(selectedTower)) {
        selectedTower = null; panel.hidden = true; panel.innerHTML = ""; return;
      }
      const t = selectedTower, def = TOWER_TYPES[t.type], st = stat(t);
      let html = '<span class="title">' + def.icon + " " + def.name + " — poz. " + t.level + "/" + def.levels.length + "</span>";
      html += '<span class="stats">' + statLine(t) + "</span>";
      if (!isMax(t)) {
        html += '<button class="btn" data-act="upgrade"' + (money < st.up ? " disabled" : "") +
                '>⬆️ Ulepsz (💰 ' + st.up + ")</button>";
      } else {
        html += '<span class="stats">⭐ MAX</span>';
      }
      if (st.timeStop && t === stopHolder) {
        const cd = t.tsCd || 0;
        html += '<button class="btn za" data-act="timestop"' + (cd > 0 || phase !== "active" ? " disabled" : "") +
                '>⏱️ ZA WARUDO' + (cd > 0 ? " (" + Math.ceil(cd) + "s)" : "") + "</button>";
      } else if (st.timeStop) {
        html += '<span class="stats">⏱️ ZA WARUDO zajęte przez innego Jotaro</span>';
      }
      html += '<button class="btn close" data-act="close">✖</button>';
      panel.innerHTML = html;
      panel.hidden = false;
      panel.querySelectorAll("button").forEach((b) => b.addEventListener("click", () => {
        if (b.dataset.act === "upgrade") upgradeTower(t);
        else if (b.dataset.act === "timestop") activateTimeStop(t);
        else { selectedTower = null; refreshPanel(); }
      }));
    }
    // lekka aktualizacja przycisków co klatkę (bez przebudowy panelu — nie gubi kliknięć)
    function tickPanel() {
      if (!selectedTower || !towers.includes(selectedTower)) return;
      const panel = document.getElementById("towerPanel");
      const up = panel.querySelector('[data-act="upgrade"]');
      if (up) up.disabled = money < stat(selectedTower).up;
      const za = panel.querySelector('[data-act="timestop"]');
      if (za) {
        const cd = selectedTower.tsCd || 0;
        za.disabled = cd > 0 || phase !== "active";
        za.textContent = "⏱️ ZA WARUDO" + (cd > 0 ? " (" + Math.ceil(cd) + "s)" : "");
      }
    }
    function upgradeTower(t) {
      if (isMax(t)) return false;
      const cost = stat(t).up;
      if (money < cost) return false;
      money -= cost; t.level += 1;
      if (stat(t).timeStop && !stopHolder) stopHolder = t;  // pierwszy Jotaro na L3 = użytkownik ZA WARUDO
      syncHud(); refreshPanel();
      return true;
    }
    function activateTimeStop(t) {
      if (t !== stopHolder || !stat(t).timeStop || (t.tsCd || 0) > 0 || phase !== "active") return false;
      timeStop = TIMESTOP_DUR; t.tsCd = TIMESTOP_CD;
      refreshPanel();
      return true;
    }

    // dodaje sprite wieży wg jej typu: startuje zapętloną animacją spoczynku
    function addTowerSprite(t) {
      const def = TOWER_TYPES[t.type];
      const img = document.createElement("img");
      img.alt = def.name;
      img.className = "tower-sprite sprite-idle";
      img.style.left = (t.x / W * 100) + "%";
      img.style.top = (t.y / H * 100) + "%";
      img.style.height = def.idleH;
      img.style.transform = UP;
      img.src = def.idle;
      towersLayer.appendChild(img);
      t.el = img; t.phase = "idle"; t.angle = 0; t.flip = 1;
    }

    // stany: idle (zapętlone) ↔ atak (gdy wróg w zasięgu). melee obraca się i doskakuje;
    // ranged stoi na kaflu i tylko odbija się w lewo/prawo ku celowi.
    function updateTowerSprites() {
      for (const t of towers) {
        if (!t.el) continue;
        const def = TOWER_TYPES[t.type], st = stat(t);
        // ten sam cel co w walce (utrzymany przez histerezę) — spójne obracanie/doskok
        const target = (t.target && enemies.includes(t.target) &&
          Math.hypot(t.target.x - t.x, t.target.y - t.y) <= st.range) ? t.target : null;

        if (target) {
          const rad = Math.atan2(target.y - t.y, target.x - t.x);
          const best = Math.hypot(target.x - t.x, target.y - t.y);
          if (t.phase !== "attack") {
            t.phase = "attack"; t.el.src = def.attack;
            t.el.className = "tower-sprite sprite-attack";
            t.el.style.height = def.attackH;
            t.angle = null; // wymuś aktualizację pozycji/obrotu przy wejściu w atak
          }
          if (def.melee) {
            const deg = rad * 180 / Math.PI + def.facingOffset;
            const flip = Math.cos(rad) < 0 ? -1 : 1; // wróg po lewej → odbicie w pionie (trik obrotu)
            const reach = Math.min(def.lunge, best);
            const lx = t.x + Math.cos(rad) * reach, ly = t.y + Math.sin(rad) * reach;
            if (t.angle === null || Math.abs(deg - t.angle) > 0.5 || flip !== t.flip) {
              t.angle = deg; t.flip = flip;
              t.el.style.left = (lx / W * 100) + "%";
              t.el.style.top = (ly / H * 100) + "%";
              t.el.style.transform = "translate(-50%,-58%) rotate(" + deg + "deg) scaleY(" + flip + ")";
            }
          } else {
            const flip = Math.cos(rad) < 0 ? -1 : 1; // wróg po lewej → odbicie poziome
            if (t.angle === null || flip !== t.flip) {
              t.angle = 0; t.flip = flip;
              t.el.style.left = (t.x / W * 100) + "%";
              t.el.style.top = (t.y / H * 100) + "%";
              t.el.style.transform = "translate(-50%,-58%) scaleX(" + flip + ")";
            }
          }
        } else if (t.phase !== "idle") {
          t.phase = "idle"; t.el.src = def.idle;
          t.el.className = "tower-sprite sprite-idle";
          t.el.style.height = def.idleH;
          t.angle = 0; t.flip = 1;
          t.el.style.left = (t.x / W * 100) + "%";  // powrót na środek kafla
          t.el.style.top = (t.y / H * 100) + "%";
          t.el.style.transform = UP;
        }
      }
    }
    const dpr = window.devicePixelRatio || 1;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.aspectRatio = W + " / " + H;
    ctx.scale(dpr, dpr);

    // ścieżka (współrzędne kafli); końce poza planszą
    const WAYPOINTS = [
      { c: -1, r: 1 }, { c: 2, r: 1 }, { c: 2, r: 5 }, { c: 6, r: 5 },
      { c: 6, r: 2 }, { c: 9, r: 2 }, { c: 9, r: 6 }, { c: 12, r: 6 },
    ];
    const center = (c, r) => ({ x: c * TILE + TILE / 2, y: r * TILE + TILE / 2 });
    const pathPx = WAYPOINTS.map((w) => center(w.c, w.r));

    // zbiór kafli zajętych przez ścieżkę (nie można budować)
    const pathTiles = new Set();
    for (let i = 0; i < WAYPOINTS.length - 1; i++) {
      let a = WAYPOINTS[i], b = WAYPOINTS[i + 1];
      const dc = Math.sign(b.c - a.c), dr = Math.sign(b.r - a.r);
      let c = a.c, r = a.r;
      pathTiles.add(c + "," + r);
      while (c !== b.c || r !== b.r) { c += dc; r += dr; pathTiles.add(c + "," + r); }
    }
    const key = (c, r) => c + "," + r;
    const inBounds = (c, r) => c >= 0 && c < COLS && r >= 0 && r < ROWS;

    let money, lives, wave, phase, enemies, towers, projectiles, toSpawn, spawnTimer, hover;

    function reset() {
      money = 120; lives = 15; wave = 0; phase = "idle";
      enemies = []; towers = []; projectiles = []; toSpawn = 0; spawnTimer = 0; hover = null;
      selectedTower = null; timeStop = 0; stopHolder = null;
      towersLayer.innerHTML = "";
      setBanner("");
      syncHud();
      refreshPanel();
    }

    function setBanner(text, cls) {
      const b = document.getElementById("banner");
      b.textContent = text; b.className = "banner" + (cls ? " " + cls : "");
    }
    function syncHud() {
      document.getElementById("money").textContent = money;
      document.getElementById("lives").textContent = lives;
      document.getElementById("wave").textContent = wave;
      document.getElementById("maxwave").textContent = MAX_WAVES;
      const names = { idle: "Gotowy", active: "Fala trwa…", win: "Wygrana!", lose: "Przegrana" };
      document.getElementById("phase").textContent = names[phase] || "—";
      document.getElementById("start").disabled = phase !== "idle";
      refreshPicker();
    }

    function startWave() {
      if (phase !== "idle") return;
      wave += 1;
      toSpawn = 4 + wave * 2;
      spawnTimer = 0;
      phase = "active";
      setBanner("");
      syncHud();
    }

    let enemySeq = 0;
    function spawnEnemy() {
      const hp = 4 + (wave - 1) * 2; // fala 1 = 4 HP → ~2 s pod ostrzałem jednej wieży (2 dmg/s)
      enemies.push({
        id: ++enemySeq,
        x: pathPx[0].x, y: pathPx[0].y, wp: 1,
        speed: 55 + wave * 4, hp: hp, maxHp: hp, alive: true,
      });
    }

    function canBuild(c, r) {
      if (!inBounds(c, r)) return false;
      if (pathTiles.has(key(c, r))) return false;
      return !towers.some((t) => t.c === c && t.r === r);
    }

    function tryPlace(c, r, type) {
      if (phase === "win" || phase === "lose") return false;
      if (!canBuild(c, r)) return false;
      const def = TOWER_TYPES[type || selectedType];
      if (!def || money < def.cost) return false;
      const p = center(c, r);
      const t = { c, r, x: p.x, y: p.y, cd: 0, type: type || selectedType, level: 1, ramp: 0, tsCd: 0, target: null };
      towers.push(t);
      addTowerSprite(t);
      money -= def.cost;
      syncHud();
      return true;
    }

    // ---- pętla gry ----
    function update(dt) {
      if (phase !== "active") return;

      // zegary zdolności: globalny stop czasu + cooldowny wież
      if (timeStop > 0) timeStop = Math.max(0, timeStop - dt);
      for (const t of towers) if (t.tsCd > 0) t.tsCd = Math.max(0, t.tsCd - dt);
      const frozen = timeStop > 0;   // ZA WARUDO: wrogowie stoją, wieże wciąż biją

      // spawn (wstrzymany w czasie stopu)
      if (!frozen && toSpawn > 0) {
        spawnTimer -= dt;
        if (spawnTimer <= 0) { spawnEnemy(); toSpawn -= 1; spawnTimer = 0.75; }
      }

      // wrogowie (nie ruszają się podczas stopu czasu)
      if (!frozen) for (const e of enemies) {
        if (!e.alive) continue;
        const wp = pathPx[e.wp];
        if (!wp) { e.alive = false; e.leaked = true; continue; }
        const dx = wp.x - e.x, dy = wp.y - e.y;
        const d = Math.hypot(dx, dy);
        const step = e.speed * dt;
        if (step >= d) { e.x = wp.x; e.y = wp.y; e.wp += 1; }
        else { e.x += (dx / d) * step; e.y += (dy / d) * step; }
      }
      // leaki
      for (const e of enemies) {
        if (e.leaked) { lives -= 1; e.counted = true; }
      }
      if (enemies.some((e) => e.leaked)) syncHud();
      enemies = enemies.filter((e) => e.alive && !e.leaked);

      // wieże atakują (również podczas stopu czasu — biją w zamrożonych wrogów)
      for (const t of towers) {
        const def = TOWER_TYPES[t.type], st = stat(t);
        t.target = pickTarget(t, st.range);
        const target = t.target;

        if (def.ramp) {
          // Jotaro: ciągłe obrażenia, które rosną im dłużej bez przerwy atakuje
          if (target) {
            t.ramp = Math.min(def.rampTime, t.ramp + dt);
            const mult = 1 + (def.rampMax - 1) * (t.ramp / def.rampTime);
            target.hp -= st.dps * mult * dt;
            if (target.hp <= 0 && target.alive) { target.alive = false; money += KILL_REWARD; }
          } else {
            t.ramp = Math.max(0, t.ramp - dt * 2);  // stygnie szybciej, niż narasta
          }
          continue;  // brak pocisków — cios wręcz
        }

        // pozostałe wieże: strzał co 1/rate, obrażenia wg poziomu
        t.cd -= dt;
        if (t.cd > 0) continue;
        if (target) {
          projectiles.push({
            x: t.x, y: t.y, target, speed: def.projSpeed || 420, dmg: st.dmg,
            visible: !def.melee, arrow: def.arrow, color: def.projColor, size: def.projSize || 4,
          });
          t.cd = 1 / st.rate;
        }
      }

      // pociski
      for (const p of projectiles) {
        if (!p.target || !p.target.alive) { p.dead = true; continue; }
        const dx = p.target.x - p.x, dy = p.target.y - p.y;
        const d = Math.hypot(dx, dy), step = p.speed * dt;
        if (step >= d) {
          p.x = p.target.x; p.y = p.target.y; p.dead = true;
          p.target.hp -= p.dmg;
          if (p.target.hp <= 0 && p.target.alive) { p.target.alive = false; money += KILL_REWARD; }
        } else { p.x += (dx / d) * step; p.y += (dy / d) * step; }
      }
      projectiles = projectiles.filter((p) => !p.dead);
      enemies = enemies.filter((e) => e.alive);
      syncHud();

      // koniec fali / gry
      if (lives <= 0) { phase = "lose"; setBanner("Przegrana! Wrogowie przedarli się 💀", "lose"); syncHud(); return; }
      if (toSpawn === 0 && enemies.length === 0) {
        if (wave >= MAX_WAVES) { phase = "win"; setBanner("Wygrana! Obroniłeś wszystkie fale 🎉", "win"); }
        else { phase = "idle"; setBanner("Fala " + wave + " odparta! Kliknij „Start fali”."); }
        syncHud();
      }
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      // kafle
      for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
        const isPath = pathTiles.has(key(c, r));
        ctx.fillStyle = isPath ? "#c9a26b" : (((c + r) % 2) ? "#bbf7d0" : "#c7f9d5");
        ctx.fillRect(c * TILE, r * TILE, TILE, TILE);
        ctx.strokeStyle = "rgba(0,0,0,0.05)";
        ctx.strokeRect(c * TILE, r * TILE, TILE, TILE);
      }
      // podgląd budowy (zasięg wybranego typu na poziomie 1)
      const selDef = TOWER_TYPES[selectedType];
      if (hover && canBuild(hover.c, hover.r) && money >= selDef.cost && phase !== "win" && phase !== "lose") {
        const p = center(hover.c, hover.r);
        ctx.fillStyle = "rgba(79,70,229,0.15)";
        ctx.beginPath(); ctx.arc(p.x, p.y, selDef.levels[0].range, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "rgba(79,70,229,0.35)";
        ctx.fillRect(hover.c * TILE + 10, hover.r * TILE + 10, TILE - 20, TILE - 20);
      }
      // zasięg wybranej (postawionej) wieży
      if (selectedTower && towers.includes(selectedTower)) {
        ctx.fillStyle = "rgba(16,185,129,0.12)";
        ctx.beginPath(); ctx.arc(selectedTower.x, selectedTower.y, stat(selectedTower).range, 0, Math.PI * 2); ctx.fill();
      }
      // wieże: podstawka + pigułki poziomu; sam sprite (gif) jest nakładką <img>
      for (const t of towers) {
        ctx.fillStyle = "rgba(55,48,163,0.25)";
        ctx.beginPath(); ctx.ellipse(t.x, t.y + 12, 22, 9, 0, 0, Math.PI * 2); ctx.fill();
        if (t === selectedTower) {  // obwódka wybranej wieży
          ctx.strokeStyle = "#10b981"; ctx.lineWidth = 3;
          ctx.strokeRect(t.c * TILE + 4, t.r * TILE + 4, TILE - 8, TILE - 8);
        }
        // pigułki poziomu (1–3) w rogu kafla
        for (let i = 0; i < TOWER_TYPES[t.type].levels.length; i++) {
          ctx.fillStyle = i < t.level ? "#f59e0b" : "rgba(0,0,0,0.18)";
          ctx.fillRect(t.c * TILE + 6 + i * 8, t.r * TILE + 6, 6, 4);
        }
      }
      // pociski: melee niewidoczne; ranged rysujemy (kula działka / strzała łucznika)
      for (const p of projectiles) {
        if (!p.visible) continue;
        if (p.arrow && p.target) {
          const a = Math.atan2(p.target.y - p.y, p.target.x - p.x), len = 9;
          ctx.strokeStyle = p.color || "#a16207"; ctx.lineWidth = 2.5;
          ctx.beginPath();
          ctx.moveTo(p.x - Math.cos(a) * len, p.y - Math.sin(a) * len);
          ctx.lineTo(p.x + Math.cos(a) * len, p.y + Math.sin(a) * len);
          ctx.stroke();
        } else {
          ctx.fillStyle = p.color || "#334155";
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size || 4, 0, Math.PI * 2); ctx.fill();
        }
      }
      // wrogowie
      for (const e of enemies) {
        ctx.fillStyle = "#ef4444";
        ctx.beginPath(); ctx.arc(e.x, e.y, 14, 0, Math.PI * 2); ctx.fill();
        // pasek HP
        const w = 30, h = 5, x = e.x - w / 2, y = e.y - 24;
        ctx.fillStyle = "#00000030"; ctx.fillRect(x, y, w, h);
        ctx.fillStyle = "#22c55e"; ctx.fillRect(x, y, w * Math.max(0, e.hp / e.maxHp), h);
      }
      // ZA WARUDO — zatrzymany czas
      if (timeStop > 0) {
        ctx.fillStyle = "rgba(76,29,149,0.28)";
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "#fde047";
        ctx.font = "bold 46px system-ui, sans-serif";
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("ZA WARUDO — czas stanął!", W / 2, H / 2);
        ctx.textAlign = "start"; ctx.textBaseline = "alphabetic";
      }
    }

    let last = 0;
    function loop(ts) {
      const dt = Math.min(0.05, (ts - last) / 1000 || 0);
      last = ts;
      update(dt);
      updateTowerSprites();
      tickPanel();
      draw();
      requestAnimationFrame(loop);
    }

    // ---- wejście (mysz + dotyk) ----
    function toTile(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const x = (clientX - rect.left) / rect.width * W;
      const y = (clientY - rect.top) / rect.height * H;
      return { c: Math.floor(x / TILE), r: Math.floor(y / TILE) };
    }
    canvas.addEventListener("click", (e) => {
      const tile = toTile(e.clientX, e.clientY);
      const existing = towers.find((t) => t.c === tile.c && t.r === tile.r);
      if (existing) selectTower(existing);                       // klik w wieżę → panel ulepszeń
      else if (tryPlace(tile.c, tile.r)) { selectedTower = null; refreshPanel(); }  // klik w trawę → budowa
    });
    canvas.addEventListener("mousemove", (e) => { hover = toTile(e.clientX, e.clientY); });
    canvas.addEventListener("mouseleave", () => { hover = null; });

    document.getElementById("start").addEventListener("click", startWave);
    document.getElementById("reset").addEventListener("click", reset);

    // hook testowy / debug
    window.TD = {
      startWave, tryPlace, reset,
      state: () => ({ money, lives, wave, phase, enemies: enemies.length, towers: towers.length, toSpawn, selected: selectedType, frozen: timeStop > 0 }),
      select: (type) => { if (TOWER_TYPES[type]) { selectedType = type; refreshPicker(); } },
      giveMoney: (n) => { money += n; syncHud(); },   // pomocnik do testów/debugowania
      upgrade: (c, r) => { const t = towers.find((x) => x.c === c && x.r === r); return t ? upgradeTower(t) : false; },
      level: (c, r) => { const t = towers.find((x) => x.c === c && x.r === r); return t ? t.level : 0; },
      targetId: (c, r) => { const t = towers.find((x) => x.c === c && x.r === r); return t && t.target ? t.target.id : null; },
      timeStop: (c, r) => { const t = towers.find((x) => x.c === c && x.r === r); return t ? activateTimeStop(t) : false; },
    };

    buildPicker();
    reset();
    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
